services:
  api:
    build:
      context: ./api
    ports:
      - 5000:80
    volumes:
      - ./api:/var/www/html
    depends_on:
     - database

  app:
    build:
      context: ./app
    ports:
      - 8080:80
    volumes:
      - ./app/build/client:/var/www/html
    
  database:
   image: mysql:8.2.0
   container_name: "database"
   command: --default-authentication-plugin=mysql_native_password
   environment:
     MYSQL_ROOT_PASSWORD: test
     MYSQL_DATABASE: weddingsite_db
     MYSQL_USER: test
     MYSQL_PASSWORD: test
   ports:
      - 3306:3306
   volumes:
      - .database_data:/var/lib/mysql

  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080
    environment:
      ADMINER_DEFAULT_SERVER: database
    depends_on:
     - database